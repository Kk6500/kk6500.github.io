contents:
  - title: "Threat Intelligence SOAR Engine"
    description:
      - "Architected a decoupled Security Orchestration, Automation, and Response (SOAR) dashboard utilizing a Vue.js frontend with PrimeVue components and a Python/FastAPI backend."
      - "Engineered a resilient threat intelligence parser to extract Indicators of Compromise (IOCs) from malformed .eml files, utilizing aggressive string sanitization to prevent backend crashes."
